<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" width="18" height="18">
  <!-- macOS menu bar template: crystal silhouette, black + alpha only.
       Simplified geometry for 18x18 clarity. -->

  <!-- Crystal body: simplified gem outline with filled facets -->
  <!-- Left crown facet -->
  <polygon points="3,8 6.5,4 9,3.5" fill="#000" opacity="0.55"/>
  <!-- Right crown facet -->
  <polygon points="15,8 11.5,4 9,3.5" fill="#000" opacity="0.4"/>

  <!-- Table (top flat) -->
  <polygon points="6.5,4 11.5,4 9,3.5" fill="#000" opacity="0.75"/>

  <!-- Left pavilion -->
  <polygon points="3,8 9,3.5 9,16" fill="#000" opacity="0.7"/>
  <!-- Right pavilion -->
  <polygon points="15,8 9,3.5 9,16" fill="#000" opacity="0.5"/>

  <!-- Table highlight -->
  <polygon points="7,4.2 11,4.2 9.5,3.7 8,3.7" fill="#000" opacity="0.9"/>

  <!-- Bright spot on table -->
  <circle cx="8.2" cy="4.2" r="0.6" fill="#000" opacity="0.95"/>
</svg>
