<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" width="340" height="110">
  <!-- Winze wordmark + 2-line slogan. Light text for dark backgrounds.
       Gem aligned to typography: top = i-dot top in "winze" (y≈13.7),
       bottom = g-descender in "Everything" (y≈97.6).
       Gem right edge kerned close to leftmost text edge (~x=110). -->
  <defs>
    <linearGradient id="wmL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B8FE0"/>
      <stop offset="100%" stop-color="#5548A0"/>
    </linearGradient>
    <linearGradient id="wmR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A3F90"/>
      <stop offset="100%" stop-color="#2A2260"/>
    </linearGradient>
  </defs>

  <!-- Crystal icon mark
       Top (table apex):    y=13.7  (i-dot top)
       Girdle (widest):     y≈47    (~40% down)
       Bottom (pavilion):   y=97.6  (g-descender bottom)
       Right edge (girdle): x≈104   (kerned gap to text at x≈110)
       Center x:            ≈70
       Left edge (girdle):  ≈36     -->

  <!-- Left crown facet -->
  <polygon points="36,47 56,22 70,14" fill="#6358B0"/>
  <!-- Right crown facet -->
  <polygon points="104,47 84,22 70,14" fill="#4A3F90"/>
  <!-- Left pavilion -->
  <polygon points="36,47 70,14 70,98" fill="url(#wmL)"/>
  <!-- Right pavilion -->
  <polygon points="104,47 70,14 70,98" fill="url(#wmR)"/>
  <!-- Table -->
  <polygon points="56,22 84,22 70,14" fill="#C4B8FF" opacity="0.8"/>
  <!-- Sparkle -->
  <circle cx="63" cy="23" r="3" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="63" cy="23" r="1.4" fill="#FFFFFF" opacity="0.9"/>

  <!-- All text right-aligned to a common right edge -->

  <!-- Logotype: "winze" -->
  <text x="322" y="46"
        font-family="Inter, 'Plus Jakarta Sans', Outfit, -apple-system, 'Segoe UI', sans-serif"
        font-size="48" font-weight="300" letter-spacing="4.5"
        fill="#E8E0FF" text-anchor="end">winze</text>

  <!-- Slogan line 1 -->
  <text x="322" y="72"
        font-family="Inter, 'Plus Jakarta Sans', Outfit, -apple-system, 'Segoe UI', sans-serif"
        font-size="17" font-weight="400" letter-spacing="5"
        fill="#9B8FE0" opacity="0.7" text-anchor="end">Nothing forgotten.</text>

  <!-- Slogan line 2 -->
  <text x="322" y="94"
        font-family="Inter, 'Plus Jakarta Sans', Outfit, -apple-system, 'Segoe UI', sans-serif"
        font-size="17" font-weight="400" letter-spacing="5"
        fill="#9B8FE0" opacity="0.7" text-anchor="end">Everything found.</text>
</svg>
