<svg xmlns="http://www.w3.org/2000/svg" viewBox="78 86 357 357" width="16" height="16">
  <defs>
    <!-- Crystal body: deep violet to blue -->
    <linearGradient id="crystalMain" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#7B6FC0"/>
      <stop offset="35%" stop-color="#5548A0"/>
      <stop offset="70%" stop-color="#3A2F80"/>
      <stop offset="100%" stop-color="#241E5E"/>
    </linearGradient>

    <!-- Left facet: lighter, catching light -->
    <linearGradient id="facetLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B8FE0"/>
      <stop offset="100%" stop-color="#6358B0"/>
    </linearGradient>

    <!-- Right facet: darker, shadow side -->
    <linearGradient id="facetRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A3F90"/>
      <stop offset="100%" stop-color="#2A2260"/>
    </linearGradient>

    <!-- Top table facet: brightest, where light enters -->
    <linearGradient id="facetTop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C4B8FF"/>
      <stop offset="50%" stop-color="#9B8FE0"/>
      <stop offset="100%" stop-color="#7B6FC0"/>
    </linearGradient>

    <!-- Internal refraction highlight -->
    <linearGradient id="refraction" x1="40%" y1="20%" x2="60%" y2="80%">
      <stop offset="0%" stop-color="#E8E0FF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#9B8FE0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5548A0" stop-opacity="0"/>
    </linearGradient>

    <!-- Bright highlight spark -->
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E8E0FF"/>
      <stop offset="100%" stop-color="#C4B8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === CRYSTAL SHAPE: emerald-cut gem, viewed slightly from above === -->

  <!-- Bottom point (pavilion tip) -->
  <!-- Left pavilion facet -->
  <polygon points="256,420 138,240 200,200"
           fill="url(#facetRight)" opacity="0.85"/>
  <!-- Right pavilion facet -->
  <polygon points="256,420 374,240 312,200"
           fill="#2A2260" opacity="0.8"/>
  <!-- Center-left pavilion -->
  <polygon points="256,420 200,200 256,188"
           fill="url(#crystalMain)" opacity="0.9"/>
  <!-- Center-right pavilion -->
  <polygon points="256,420 312,200 256,188"
           fill="#3A2F80" opacity="0.9"/>

  <!-- Crown: left facet -->
  <polygon points="138,240 200,200 200,140 156,180"
           fill="url(#facetLeft)"/>
  <!-- Crown: right facet -->
  <polygon points="374,240 312,200 312,140 356,180"
           fill="url(#facetRight)"/>

  <!-- Crown: upper-left facet -->
  <polygon points="156,180 200,140 232,108 184,134"
           fill="#9B8FE0" opacity="0.9"/>
  <!-- Crown: upper-right facet -->
  <polygon points="356,180 312,140 280,108 328,134"
           fill="#5548A0" opacity="0.9"/>

  <!-- Crown: left side panel -->
  <polygon points="138,240 156,180 200,200"
           fill="#6358B0" opacity="0.75"/>
  <!-- Crown: right side panel -->
  <polygon points="374,240 356,180 312,200"
           fill="#3A2F80" opacity="0.75"/>

  <!-- Table (top flat facet) — the brightest face -->
  <polygon points="232,108 280,108 312,140 200,140"
           fill="url(#facetTop)"/>

  <!-- Girdle line (the widest edge) -->
  <polygon points="138,240 156,180 200,200 312,200 356,180 374,240 312,200 200,200"
           fill="none" stroke="#9B8FE0" stroke-width="1" opacity="0.4"/>

  <!-- Internal refraction lines — suggesting light bouncing inside -->
  <line x1="220" y1="140" x2="280" y2="340" stroke="#C4B8FF" stroke-width="1.5" opacity="0.15"/>
  <line x1="260" y1="120" x2="200" y2="320" stroke="#C4B8FF" stroke-width="1" opacity="0.12"/>
  <line x1="290" y1="150" x2="240" y2="360" stroke="#9B8FE0" stroke-width="1" opacity="0.1"/>

  <!-- Internal refraction patch — light caustic -->
  <polygon points="230,220 270,210 285,280 240,300"
           fill="url(#refraction)"/>

  <!-- Bright highlight on table edge (light catch) -->
  <circle cx="244" cy="118" r="8" fill="url(#spark)" opacity="0.85"/>

  <!-- Small secondary sparkle on left crown facet -->
  <circle cx="178" cy="160" r="4" fill="url(#spark)" opacity="0.45"/>

  <!-- Edge highlights — subtle bright lines on crystal edges -->
  <g stroke="#C4B8FF" stroke-linecap="round" opacity="0.3">
    <line x1="200" y1="140" x2="200" y2="200" stroke-width="1.5"/>
    <line x1="312" y1="140" x2="312" y2="200" stroke-width="1"/>
    <line x1="232" y1="108" x2="200" y2="140" stroke-width="1.5"/>
    <line x1="280" y1="108" x2="312" y2="140" stroke-width="1"/>
  </g>
</svg>
